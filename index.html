<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>ONIRICA DIRETTA TV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }
    #playerWrapper {
      position: relative;
      width: 100%;
      height: 100%;
      background: black;
    }
    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }
    #muteBtn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 32px;
      font-family: sans-serif;
      padding: 20px 40px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      z-index: 20;
      display: none;
      pointer-events: auto;
    }
  </style>
</head>
<body>

<div id="playerWrapper">
  <video id="vid" autoplay muted playsinline></video>
  <button id="muteBtn">Attiva audio</button>
</div>

<script>
  const video = document.getElementById('vid');
  const muteBtn = document.getElementById('muteBtn');
  const playerWrapper = document.getElementById('playerWrapper');

  const streamUrl = "https://euc11.playlist.ttvnw.net/v1/playlist/CsUGWj_JGk-9SZVcYwCVbhnoSKq1S6Ml86jqlGcRYbWmLe4x5Je-7kH8pF2mMYnFfiPU_mr3cwubOlSd9VKo41IF1umalVNrvS5oFYAhlIYZ4hOppilZJ_RYMkoCVkBZ1z157wkh42o04dKVRGCoQ13MKLrnIORqwmHHLFelnS86sMWM-qLsTkDrqLra3W1sL3td-PE63uEELEsl_zBXotuaMKdeusL-UE7TVl69Gf5Q_UVzfNFsWT16ZmRdJCcyg33l5x07p9SSJjiIlSXyGEh5WMABspUAmFYwgPSuDv05SEI886MnXwg-RmzSx9ndrn46x1tBIn7YoxYXs4xISb6H-LZjNFQTq-PEg72SnSS3AGdmF-RJkkj3SE-e7-a6K0DI5L_SKtgKA9d85rA_B7N8TZh8KIfLpJQvtK3XxQhlmozkeUGTxWiCWpNfoiInlNVSPkvt3bUyhCP5tTs20N-0YxlChTUieAe95_JoCHxPEy4ZRKXyhLoFQL9MPROIItR8WkRVYpJSfqFAp_GXbu3XO32P82ZEOiD8xBbQbaNwi8O51XTse9Xsdlv0FAp9BwFseq-dkuDAni1sECSFgKnH_IzTBGYx2JY_oolRmsZUZDUdsTvWnEVChuiYGVVlrOSPoKcxZ0Eo-54HEr1-28tMr_67vc0eN4bgAXkTfTDsJ1WfZb5QxVu-raQ6i_bTToUt4RZcZsNzw1T9KBNwtQMMyb8q_WCMYhflK1XvfgQdjElCud7briOCOZMBWH9CwcC7dIIPxRN6HDgPhfpZNi_6_wGjNK0g5m1sBAFCM18GBL9PQNsdUiGzPn2EM7nvL8Zh85ZpFyCGP31vc-B9NX7rouJN0MyceDwtCfK89NYxvr5qCR0akddxV1TeAGURojZ3XmN0w73ugbJD6cz-PB_0y5eUAh70AV90Ot9TsQ0dV4Qi1NkngOsR-JXk7TVo5SHp_JPxg8rGsu5t_UlwF48XvYqgI0bPg_D1KzARwpRjhgTBzY_-A7AlSdAchELGGXqhdmucqL-nmfgYV1ZZp_u8YobKgixJkaqFivXywXruaKVwrnWUZNWSW2VUAAcWaIeLKMN-N2uuDjfJSe9a9TYut6KhQhJJGgzhxqKtZ1nDGORf_GEgASoJZXUtd2VzdC0yMOEO.m3u8";

  // Supporto HLS
  if (video.canPlayType('application/vnd.apple.mpegurl')) {
    // Safari
    video.src = streamUrl;
  } else if (Hls.isSupported()) {
    // Altri browser
    const hls = new Hls();
    hls.loadSource(streamUrl);
    hls.attachMedia(video);
  } else {
    alert("Il tuo browser non supporta lo streaming HLS");
  }

  // Mostra/nasconde pulsante audio
  let hideTimer;
  function showControls() {
    muteBtn.style.display = 'block';
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      muteBtn.style.display = 'none';
    }, 3000);
  }

  playerWrapper.addEventListener('click', showControls);

  muteBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    video.muted = !video.muted;
    muteBtn.textContent = video.muted ? 'Attiva audio' : 'Disattiva audio';
  });

  // Blocca tasto destro e shortcut
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    const block = [" ", "ArrowRight", "ArrowLeft", "F12"];
    if (block.includes(e.key) || (e.ctrlKey && e.shiftKey && e.key === "I")) {
      e.preventDefault();
    }
  });

  // Disabilita doppio tap su mobile
  let lastTap = 0;
  video.addEventListener('touchend', (e) => {
    const currentTime = new Date().getTime();
    const tapLength = currentTime - lastTap;
    if (tapLength < 300 && tapLength > 0) {
      e.preventDefault();
    }
    lastTap = currentTime;
  });

  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('gesturechange', e => e.preventDefault());
  document.addEventListener('gestureend', e => e.preventDefault());
</script>

</body>
</html>
